spring:
  application:
    name: auth-template-backend
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/authtemplate?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}
      timeout: 2000ms
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:this-is-a-local-dev-secret-must-be-changed-in-production}
  access-token-expiry: 1800
  refresh-token-expiry: 604800

cookie:
  secure: false

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  http:
    client-ip:
      trust-forwarded-headers: false
      trusted-proxies: []
  mail:
    from: ${MAIL_FROM:noreply@example.com}
  name: ${APP_NAME:auth-template}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      show-components: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: false
  prometheus:
    metrics:
      export:
        descriptions: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,250ms,500ms,1s,3s

info:
  application:
    name: ${spring.application.name}
    stack: actuator,micrometer,prometheus,grafana

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:false}

server:
  port: 8080
