server {
    listen 443 ssl;
    server_name example.com;  # 운영 도메인으로 교체

    # SSL 인증서 (Let's Encrypt 기준)
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── 보안 헤더 ───────────────────────────────────────────────────────
    # HSTS: Spring Security에서도 설정하지만 nginx에서 한 번 더 선언
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # MIME 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;
    # Clickjacking 방지
    add_header X-Frame-Options "DENY" always;
    # XSS 필터 (레거시 브라우저 대응)
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── X-Forwarded-For 스푸핑 방지 ────────────────────────────────────
    # 클라이언트가 X-Forwarded-For 헤더를 임의로 설정해 IP 기반 Rate Limit을 우회하는 것을 방지.
    # $remote_addr(nginx가 실제로 연결을 받은 IP)로 완전히 덮어씌워 backend에 전달.
    # — 주의: nginx 앞에 또 다른 프록시(CDN, L4 LB)가 있다면 해당 프록시 IP를 신뢰 범위에 추가하고
    #         $proxy_add_x_forwarded_for 사용을 검토해야 함.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
    # nginx가 추가한 헤더 외 클라이언트 X-Forwarded-For 헤더를 백엔드로 전달하지 않음
    proxy_set_header X-Real-IP $remote_addr;

    # ─── 공통 프록시 설정 ─────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;

    # ─── 요청 크기 제한 ───────────────────────────────────────────────
    client_max_body_size 10m;

    # ─── 라우팅 ──────────────────────────────────────────────────────
    # /api/** → Spring Boot 백엔드
    location /api/ {
        proxy_pass http://backend;
    }

    # OAuth2 인가 흐름 → 백엔드
    location /oauth2/ {
        proxy_pass http://backend;
    }
    location /login/oauth2/ {
        proxy_pass http://backend;
    }

    # Swagger UI (운영 환경에서는 SWAGGER_ENABLED=false로 비활성화 권장)
    location /swagger-ui/ {
        proxy_pass http://backend;
    }
    location /api-docs/ {
        proxy_pass http://backend;
    }

    # 그 외 모든 요청 → Next.js 프론트엔드
    location / {
        proxy_pass http://frontend;
    }
}
